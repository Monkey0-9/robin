name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  rust-risk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions-rust-lang/setup-rust-toolchain@v1
    - run: cd services/risk-analytics && cargo build
    - run: cd services/risk-analytics && cargo test

  rust-compliance:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions-rust-lang/setup-rust-toolchain@v1
    - run: cd services/compliance && cargo build
    - run: cd services/compliance && cargo test

  go-gateway:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    - run: cd services/gateway && go build ./...
    - run: cd services/gateway && go vet ./...

  cpp-execution:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: sudo apt-get update && sudo apt-get install -y cmake g++-12 libnuma-dev
    - run: cmake -S services/execution-core -B services/execution-core/build -DCMAKE_BUILD_TYPE=Release
    - run: cmake --build services/execution-core/build -j$(nproc)

  python-validation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install numpy
    - run: python -c "import sys; sys.path.insert(0, 'services/ai-engine'); from verification_oracle import VerificationOracle; print('OK')"
