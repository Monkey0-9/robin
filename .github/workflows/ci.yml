name: Robin CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================================
  # Rust: Risk Analytics
  # ============================================================================
  rust-risk:
    name: "Rust — Risk Analytics"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - name: Build
        run: cd services/risk-analytics && cargo build --release
      - name: Test
        run: cd services/risk-analytics && cargo test -- --nocapture
      - name: Clippy (deny warnings)
        run: cd services/risk-analytics && cargo clippy -- -D warnings

  # ============================================================================
  # Rust: Compliance
  # ============================================================================
  rust-compliance:
    name: "Rust — Compliance"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - name: Build (lib + daemon)
        run: cd services/compliance && cargo build --release
      - name: Test
        run: cd services/compliance && cargo test -- --nocapture
      - name: Clippy
        run: cd services/compliance && cargo clippy -- -D warnings

  # ============================================================================
  # Go: Gateway Orchestrator
  # ============================================================================
  go-gateway:
    name: "Go — Gateway Orchestrator"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        run: cd services/gateway && go build ./...
      - name: Vet
        run: cd services/gateway && go vet ./...
      - name: Test
        run: cd services/gateway && go test -v -race ./...

  # ============================================================================
  # C++: Execution Core
  # ============================================================================
  cpp-execution:
    name: "C++ — Execution Core"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++-12 libnuma-dev
      - name: CMake configure (pin g++-12)
        run: |
          cmake -S services/execution-core \
                -B services/execution-core/build \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_COMPILER=g++-12
      - name: Build
        run: cmake --build services/execution-core/build -j$(nproc)
      - name: CTest (if tests exist)
        run: |
          cd services/execution-core/build
          ctest --output-on-failure 2>/dev/null || echo "No CTest targets yet"

  # ============================================================================
  # C++: Pricing
  # ============================================================================
  cpp-pricing:
    name: "C++ — Pricing"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++-12
      - name: CMake configure + build
        run: |
          cmake -S research/pricing \
                -B research/pricing/build \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_COMPILER=g++-12
          cmake --build research/pricing/build -j$(nproc)

  # ============================================================================
  # Python: AI engine validation
  # ============================================================================
  python-validation:
    name: "Python — AI Engine"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install numpy
      - name: Validate backtester
        run: python research/strategy-engine/backtester.py
      - name: Validate alternative data loader (if present)
        run: |
          if python -c "import ast; ast.parse(open('services/data-ingestion/alternative/alternative_data_loader.py').read())" 2>/dev/null; then
            echo "Syntax OK"
          else
            echo "Skipped — file not parseable"
          fi

  # ============================================================================
  # Formatting & Sanity
  # ============================================================================
  rust-fmt:
    name: "Rust — Format Check"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: cd services/risk-analytics && cargo fmt -- --check
      - run: cd services/compliance     && cargo fmt -- --check

  go-fmt:
    name: "Go — Format Check"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: |
          cd services/gateway
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files need formatting:"
            gofmt -l .
            exit 1
          fi
