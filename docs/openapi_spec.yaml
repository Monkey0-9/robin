openapi: 3.0.3
info:
  title: Robin Research API
  description: Research prototype API for order management and portfolio analytics.
  version: 0.1.0
  x-status: prototype
servers:
  - url: http://localhost:8080/v1
paths:
  /health:
    get:
      summary: Health check endpoint
      responses:
        '200':
          description: Service health status
  /orders:
    post:
      summary: Submit a new order (prototype)
      description: Routes orders to the matching engine for testing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                symbol:
                  type: string
                  example: "AAPL"
                side:
                  type: string
                  enum: [BUY, SELL]
                price:
                  type: number
                  format: float
                qty:
                  type: number
                  format: float
      responses:
        '201':
          description: Order accepted
  /portfolio/pnl:
    get:
      summary: Fetch portfolio P&L (prototype)
      responses:
        '200':
          description: Portfolio P&L data
