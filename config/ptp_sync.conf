# config/ptp_sync.conf
# IEEE 1588v2 Clock Synchronization Settings for ptp4l / phc2sys.
# Standard: Enterprise Profile (unicast negotiation)
# Target Accuracy: <100ns to UTC, <25ns internal system drift

[global]
# Two-step mode for hardware timestamping
twoStepFlag             1
slaveOnly               1
priority1               128
priority2               128
domainNumber            0
# Set log level to log offsets from master
logging_level           6
verbose                 1
use_syslog              1
summary_interval        0

# PTP Profile: Enterprise Profile Specifics
announceReceiptTimeout  3
delay_mechanism         E2E
network_transport       UDPv4
delay_filter            moving_average
delay_filter_length     10

# Hardware Clock Device
[eth2]
# Interface connected to Meinberg PTP Grandmaster Clock
tsproc_mode             filter
delayAsymmetry          0
fault_reset_interval    4
