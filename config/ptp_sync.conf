# PTP IEEE 1588v2 configuration, research/prototype targets
# Grandmaster: Oscilloquartz OSA 5430
# Target accuracy: <100ns to UTC

[global]
# Clock type
gmCapable               1
priority1               128
priority2               128
domainNumber            0
clockClass              6
clockAccuracy           0x21
offsetScaledLogVariance 0xFFFF

# Network protocol
network_transport       L2
ptp_dst_mac             01:1B:19:00:00:00

# Timing
logSyncInterval         0         # 1 second sync interval
logMinDelayReqInterval  1         # 0.5 second delay request interval
logAnnounceInterval     1         # 0.5 second announce interval
announceReceiptTimeout  3

# Hardware timestamping
hwts_filter             ptp
tx_timestamp_timeout    10
kernel_ptp             1
check_fup_sync         1
tc_spanning_tree       0

# Servo
pi_proportional_const   0.0
pi_integral_const       0.0
pi_proportional_scale   0.0
pi_proportional_exponent -0.3
pi_proportional_norm_max 0.7
pi_integral_exponent    0.4
pi_integral_norm_max    0.3
step_threshold          0.000001    # 1 microsecond step
first_step_threshold    0.00000002  # 20 nanosecond first step
max_frequency           900000000
sanity_freq_limit       200000000
